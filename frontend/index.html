<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Ducks</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
    <script src="index.js" defer></script>
  </head>

  <body>
    <!-- =========================
         NAVBAR / HEADER
    ========================== -->
    <header class="navbar">
      <a href="index.html" class="logo">BOOK DUCKS</a>

      <div class="welcome-area">
        <span id="welcomeText"></span>

        <a href="profile.html" id="profileLink" class="profile-link">
          Se din profil här ✨
        </a>
      </div>

      <div class="auth-buttons">
        <a href="login.html" class="btn">Logga in</a>
        <a href="register.html" class="btn">Registrera dig</a>
      </div>

      <button id="logoutBtn" class="logout-btn">Logga ut</button>
    </header>

    <!-- =========================
         MAIN CONTENT
    ========================== -->
    <main>
      <!-- Search -->
      <section class="search-section">
        <input
          type="text"
          id="searchInput"
          placeholder="Sök böcker eller författare..."
        />
      </section>

      <!-- Books -->
      <section class="books-section">
        <h1>Alla böcker</h1>
        <div id="booksContainer" class="books-grid"></div>
      </section>
    </main>
  </body>
</html>
